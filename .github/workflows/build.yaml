name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version: ^1.24
        id: go

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build report UI
        run: npm ci && npm run build
        working-directory: html-report/ui

      - name: Get dependencies
        run: go get -v -t -d ./...

      - name: Test
        run: go test ./...
      - name: Build
        run: make build
      - name: Clean modcache
        run: go clean -modcache

  build-report-ui:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
        name: Checkout repository

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: html-report/ui

      - name: Build
        run: npm run build
        working-directory: html-report/ui
