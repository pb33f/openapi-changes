name: VHS Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "README.md"
      - "Makefile"
      - "cmd/**"
      - "tui/**"
      - "html-report/**"
      - "sample-specs/**"
      - ".github/vhs/**"
      - ".github/assets/**"
      - "scripts/render-demos.sh"

jobs:
  verify-demos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.24

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build report UI
        run: npm ci && npm run build
        working-directory: html-report/ui

      - name: Install render dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          go install github.com/charmbracelet/vhs@v0.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Render demos
        run: make demos

      - name: Commit updated GIFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/assets/summary.gif .github/assets/console.gif
          git diff --cached --quiet || git commit -m "update demo GIFs"
          git push
